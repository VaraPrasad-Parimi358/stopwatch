<!DOCTYPE html>
<html lang="en">
<head>
<title>Prodigy Infotech Task-01</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 50px;
background:transparent;
transition:0.4s;
z-index:1000;
}
.logo{
font-size:24px;
font-weight:bold;
color:black;
}
.nav-links{
list-style:none;
display:flex;
}
.nav-links li{
margin:0 20px;
}
.nav-links a{
text-decoration:none;
font-size:18px;
color:black;
transition:0.3s;
}
.nav-links a:hover{
color:red;
}
.navbar.active{
background:black;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}
.navbar.active a{
color:white;
}
.navbar.active .logo{
color:white;
}
section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:30px;
}
#home{
background:linear-gradient(to right,green,#ffffff);
}
#about{
background:linear-gradient(to right,rgb(73, 73, 105),#e7c052);
}
#services{
background:linear-gradient(to left,rgb(190, 82, 141),#fab1a0)
}
#portfolio{
background:linear-gradient(to left,blue, #d3bc73);
}
#contact{
background:linear-gradient(to right,yellow,#75d7fb);
}
</style>
</head>
<body>
<nav class="navbar" id="navbar">
<div class="logo">Prodigy</div>
<ul class="nav-links">
<li><a href="#home">Home</a></li>
<li><a href="#about">About</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#portfolio">Portfolio</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
<section id="home">
<h1>Home Section</h1>
<p>Welcome to ProDigy Infotech Internship Task</p>
</section>
<section id="about">
<h1>About</h1>
<p>This is the About Section</p>
</section>
<section id="services">
<h1>Services</h1>
<p>This is the Services Section</p>
</section>
<section id="portfolio">
<h1>Portfolio</h1>
<p>This is the Portfolio Section</p>
</section>
<section id="contact">
<h1>Contact</h1>
<p>This is the Contact Section</p>
</section>
<script>
window.addEventListener("scroll", function(){
let navbar = document.getElementById("navbar");
if(window.scrollY > 50){
navbar.classList.add("active");
}
else{
navbar.classList.remove("active");
}
});
</script>
</body>
</html>
