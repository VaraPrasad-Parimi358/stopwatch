<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
</head>

<style>
    body{
        display: flex;
        flex-direction:column;
        align-items: center;
        background-color: rgba(171, 165, 165, 0.699);
    }
    #myH1{
        font-size: 4rem;
        font-family:Arial, Helvetica, sans-serif;
        color: black;
    }
    #container{
        display:flex;
        flex-direction: column;
        align-items: center;
        padding:30px;
        border: 5px solid;
        border-radius: 50px;
        background-color: rgb(79, 118, 126);
    }
    #display{
        font-size: 5rem;
        font-family: monospace;
        font-weight: bold;
        margin-bottom: 25px;
    }
    #controls button{
        font-size: 1.2rem;
        font-weight: bold;
        padding:10px 15px;
        margin:5px;
        min-width: 100px;
        border: none;
        cursor:pointer;
        color: aliceblue;
        transition:background-color 0.5s ease;
    }

    #startBtn{ background-color: green; }
    #startBtn:hover{ background-color: rgb(126, 225, 126); }

    #stopBtn{ background-color: rgb(203, 8, 51); }
    #stopBtn:hover{ background-color: rgb(238, 96, 96); }

    #resetBtn{ background-color: rgb(9, 153, 134); }
    #resetBtn:hover{ background-color: rgb(14, 204, 225); }

    #lapBtn{ background-color: orange; }
    #lapBtn:hover{ background-color: rgb(255, 190, 100); }

    #laps{
        margin-top: 20px;
        width: 100%;
        max-height: 150px;
        overflow-y: auto;
        background: rgb(142, 197, 197);
        border-radius: 10px;
        padding: 10px;
        font-family: monospace;
    }

    .lap-item{
        padding: 5px;
        border-bottom: 1px solid #ccc;
    }
</style>

<body>

<h1 id="myH1">Stopwatch</h1>

<div id="container">
    <div id="display">00:00:00</div>

    <div id="controls">
        <button id="startBtn" onclick="start()">Start</button>
        <button id="stopBtn" onclick="stop()">Stop</button>
        <button id="resetBtn" onclick="reset()">Reset</button>
        <button id="lapBtn" onclick="lap()">Lap</button>
    </div>
    <div id="laps"></div>
</div>

<script>
const display = document.getElementById("display");
const lapsContainer = document.getElementById("laps");

let timer = null;
let startTime = 0;
let elapsedTime = 0;
let isRunning = false;
let lapCount = 0;

function start() {
    if (!isRunning) {
        startTime = Date.now() - elapsedTime;
        timer = setInterval(update, 1000);
        isRunning = true;
    }
}

function stop() {
    if (isRunning) {
        clearInterval(timer);
        elapsedTime = Date.now() - startTime;
        isRunning = false;
    }
}
function reset() {
    clearInterval(timer);
    startTime = 0;
    elapsedTime = 0;
    isRunning = false;
    lapCount = 0;
    display.textContent = "00:00:00";
    lapsContainer.innerHTML = ""; 
}
function update() {
    let currentTime = Date.now();
    elapsedTime = currentTime - startTime;

    let seconds = Math.floor(elapsedTime / 1000) % 60;
    let minutes = Math.floor(elapsedTime / (1000 * 60)) % 60;
    let hours = Math.floor(elapsedTime / (1000 * 60 * 60));

    seconds = String(seconds).padStart(2, "0");
    minutes = String(minutes).padStart(2, "0");
    hours = String(hours).padStart(2, "0");

    display.textContent = `${hours}:${minutes}:${seconds}`;
}
function lap() {
    if (!isRunning) return;

    lapCount++;

    const lapItem = document.createElement("div");
    lapItem.classList.add("lap-item");
    lapItem.textContent = `Lap ${lapCount}: ${display.textContent}`;

    lapsContainer.prepend(lapItem);
}
</script>

</body>
</html>
