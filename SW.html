<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Stopwatch</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1d580d, #0b7b7b);
    font-family: 'Orbitron', sans-serif;
}
.container {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    color: white;
}

h1 {
    margin-bottom: 20px;
}

#display {
    font-size: 48px;
    margin-bottom: 25px;
    letter-spacing: 2px;
}

.buttons button {
    border: none;
    padding: 12px 20px;
    margin: 8px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.start { background: #00c853; color: white; }
.stop { background: #d50000; color: white; }
.reset { background: #616161; color: white; }
.lap { background: #2962ff; color: white; }

button:hover {
    transform: scale(1.1);
    opacity: 0.85;
}

#laps {
    margin-top: 20px;
    max-height: 150px;
    overflow-y: auto;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">
    <h1>Stopwatch</h1>
    <div id="display">00:00:00</div>

    <div class="buttons">
        <button class="start" onclick="start()">Start</button>
        <button class="stop" onclick="stop()">Stop</button>
        <button class="reset" onclick="reset()">Reset</button>
        <button class="lap" onclick="lap()">Lap</button>
    </div>

    <div id="laps"></div>
</div>

<script>
let timer;
let seconds = 0;
let running = false;

function updateDisplay() {
    let hrs = Math.floor(seconds / 3600);
    let mins = Math.floor((seconds % 3600) / 60);
    let secs = seconds % 60;

    document.getElementById("display").innerText =
        String(hrs).padStart(2, '0') + ":" +
        String(mins).padStart(2, '0') + ":" +
        String(secs).padStart(2, '0');
}

function start() {
    if (!running) {
        running = true;
        timer = setInterval(() => {
            seconds++;
            updateDisplay();
        }, 1000);
    }
}

function stop() {
    running = false;
    clearInterval(timer);
}

function reset() {
    running = false;
    clearInterval(timer);
    seconds = 0;
    updateDisplay();
    document.getElementById("laps").innerHTML = "";
}

function lap() {
    if (running) {
        let lapTime = document.getElementById("display").innerText;
        let lapItem = document.createElement("div");
        lapItem.innerText = "Lap: " + lapTime;
        document.getElementById("laps").appendChild(lapItem);
    }
}

updateDisplay();
</script>

</body>
</html>
